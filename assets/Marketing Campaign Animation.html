<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    @keyframes barFill {
      0%      { width: 0%; }
      33.33%  { width: 100%; }
      80%     { width: 100%; }
      80.01%  { width: 0%; }
      100%    { width: 0%; }
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
    }
  </style>
</helmet>

<div style="display:flex; align-items:center; justify-content:center; min-height:100vh;">
<div style="padding:1px; border-radius:25px; background:linear-gradient(45deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.4) 100%);">

  <div style="width:400px; border-radius:24px; background:rgba(255,255,255,0.1); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); overflow:hidden; font-family:Inter,sans-serif; padding:16px; box-sizing:border-box;">

    <!-- Header -->
    <div style="height:fit-content; padding-bottom: 16px; display:flex; align-items:center; gap:12px;">
      <span style="color:#FCF7ED; font-size:17px; font-weight:600; letter-spacing:-0.3px; flex:1; min-width:0;">Marketing Campaign</span>
      <div style="background:white; border-radius:16px; height:32px; display:flex; align-items:center; gap:7px; padding:0 13px; flex-shrink:0;">
        <div style="width:8px; height:8px; border-radius:50%; background:#2BB319; flex-shrink:0;"></div>
        <span style="color:#2BB319; font-size:11px; font-weight:500; white-space:nowrap; letter-spacing:-0.1px;">Auto · 10/10 · 0:10</span>
      </div>
    </div>

    <!-- Row 1: Email (blue) -->
    <div style="height:64px; border-radius:16px; background:white; position:relative; overflow:hidden;">
      {{ bar1 }}
      <div style="position:relative; z-index:1; display:flex; align-items:center; height:100%;">
        <div style="width:52px; display:flex; align-items:center; justify-content:center; flex-shrink:0;">
          <svg width="30" height="24" viewBox="0 0 30 24" fill="none">
            <path d="M2 2h26a1 1 0 0 1 1 1v16a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1z" stroke="#1E91BC" stroke-width="2" fill="none" stroke-linejoin="round"></path>
            <polyline points="1,4 15,14 29,4" stroke="#1E91BC" stroke-width="2" fill="none" stroke-linejoin="round"></polyline>
          </svg>
        </div>
        <div style="flex:1; padding-left:4px; min-width:0;">
          <span style="color:#1E91BC; font-size:14px; font-weight:600;">Email</span>
        </div>
        <div style="padding:0 16px 0 8px; flex-shrink:0;">
          <span style="color:rgba(85,85,85,0.5); font-size:12px; font-weight:500;">10:00 PM</span>
        </div>
      </div>
    </div>

    <!-- Connector 1 -->
    <div style="height:16px; display:flex; align-items:center; justify-content:center;">
      <div style="width:4px; height:16px; background:rgba(255,255,255,0.2); border-radius:2px;"></div>
    </div>

    <!-- Row 2: Text / SMS (green) -->
    <div style="height:64px; border-radius:16px; background:white; position:relative; overflow:hidden;">
      {{ bar2 }}
      <div style="position:relative; z-index:1; display:flex; align-items:center; height:100%;">
        <div style="width:52px; display:flex; align-items:center; justify-content:center; flex-shrink:0;">
          <svg width="30" height="28" viewBox="0 0 30 28" fill="none">
            <path d="M3 1h24a2 2 0 0 1 2 2v15a2 2 0 0 1-2 2H16l-6 6v-6H3a2 2 0 0 1-2-2V3a2 2 0 0 1 2-2z" stroke="#25980E" stroke-width="2" fill="none" stroke-linejoin="round"></path>
            <circle cx="8.5" cy="10.5" r="1.5" fill="#25980E"></circle>
            <circle cx="15" cy="10.5" r="1.5" fill="#25980E"></circle>
            <circle cx="21.5" cy="10.5" r="1.5" fill="#25980E"></circle>
          </svg>
        </div>
        <div style="flex:1; padding-left:4px; min-width:0;">
          <span style="color:#25980E; font-size:14px; font-weight:600;">Text</span>
        </div>
        <div style="padding:0 16px 0 8px; flex-shrink:0;">
          <span style="color:rgba(85,85,85,0.5); font-size:12px; font-weight:500;">11:00 PM</span>
        </div>
      </div>
    </div>

    <!-- Connector 2 -->
    <div style="height:16px; display:flex; align-items:center; justify-content:center;">
      <div style="width:4px; height:16px; background:rgba(255,255,255,0.2); border-radius:2px;"></div>
    </div>

    <!-- Row 3: Follow up email (yellow) -->
    <div style="height:64px; border-radius:16px; background:white; position:relative; overflow:hidden;">
      {{ bar3 }}
      <div style="position:relative; z-index:1; display:flex; align-items:center; height:100%;">
        <div style="width:52px; display:flex; align-items:center; justify-content:center; flex-shrink:0;">
          <svg width="30" height="24" viewBox="0 0 30 24" fill="none">
            <path d="M2 2h26a1 1 0 0 1 1 1v16a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1z" stroke="#A27901" stroke-width="2" fill="none" stroke-linejoin="round"></path>
            <polyline points="1,4 15,14 29,4" stroke="#A27901" stroke-width="2" fill="none" stroke-linejoin="round"></polyline>
          </svg>
        </div>
        <div style="flex:1; padding-left:4px; min-width:0;">
          <span style="color:#A27901; font-size:14px; font-weight:600;">Follow up email</span>
        </div>
        <div style="padding:0 16px 0 8px; flex-shrink:0;">
          <span style="color:rgba(85,85,85,0.5); font-size:12px; font-weight:500;">11:00 PM</span>
        </div>
      </div>
    </div>

    <!-- Connector 3 -->
    <div style="height:16px; display:flex; align-items:center; justify-content:center;">
      <div style="width:4px; height:16px; background:rgba(255,255,255,0.2); border-radius:2px;"></div>
    </div>

    <!-- Row 4: Campaign message (red) -->
    <div style="height:64px; border-radius:16px; background:white; position:relative; overflow:hidden;">
      {{ bar4 }}
      <div style="position:relative; z-index:1; display:flex; align-items:center; height:100%;">
        <div style="width:52px; display:flex; align-items:center; justify-content:center; flex-shrink:0;">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <path d="M26 2L2 11L12 16L17 26L26 2Z" stroke="#D42D2D" stroke-width="2" fill="none" stroke-linejoin="round"></path>
            <line x1="12" y1="16" x2="26" y2="2" stroke="#D42D2D" stroke-width="2" stroke-linecap="round"></line>
          </svg>
        </div>
        <div style="flex:1; padding-left:4px; min-width:0;">
          <span style="color:#D42D2D; font-size:14px; font-weight:600;">Campaign message</span>
        </div>
        <div style="padding:0 16px 0 8px; flex-shrink:0;">
          <span style="color:rgba(85,85,85,0.5); font-size:12px; font-weight:500;">11:00 PM</span>
        </div>
      </div>
    </div>

  </div>
</div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    const makeBar = (color, delay) => React.createElement('div', {
      style: {
        position: 'absolute',
        top: 0,
        left: 0,
        height: '100%',
        width: '0%',
        backgroundColor: color,
        animation: `barFill 3s linear ${delay}s infinite both`
      }
    });

    return {
      bar1: makeBar('#CFF2FF', 0),
      bar2: makeBar('#DBFFD3', 0.15),
      bar3: makeBar('#FFF3CE', 0.30),
      bar4: makeBar('#FFD7D7', 0.45),
    };
  }
}
</script>
</body>
</html>
