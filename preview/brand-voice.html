<!doctype html><html><head><meta charset="utf-8"><title>Voice</title>
<link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="eyebrow">Brand · Voice in one screen</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
    <div style="background:#FFFFFF;border:1px solid var(--line);border-radius:14px;padding:16px;display:flex;flex-direction:column;gap:8px;">
      <div style="font-family:'Manrope';font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:0.12em;color:#2F8F5A;">Do</div>
      <div style="font-family:var(--font-display);font-weight:700;font-size:20px;line-height:1.15;">"Made in small batches. Eaten by the spoonful."</div>
      <div style="font-family:'Manrope';font-size:12px;color:#5A5650;">Short. Concrete. Confident. Talks about the food, not itself.</div>
    </div>
    <div style="background:#FFFFFF;border:1px solid var(--line);border-radius:14px;padding:16px;display:flex;flex-direction:column;gap:8px;">
      <div style="font-family:'Manrope';font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:0.12em;color:#C2412B;">Don't</div>
      <div style="font-family:var(--font-display);font-weight:700;font-size:20px;line-height:1.15;color:#7A766E;">"Discover our revolutionary, artisanal flavour journey!"</div>
      <div style="font-family:'Manrope';font-size:12px;color:#5A5650;">Hype words, exclamation marks, "journey", "elevate", "curated experience".</div>
    </div>
  </div>
</div>
</body></html>
