<!doctype html><html><head><meta charset="utf-8"><title>Inputs</title>
<link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="eyebrow">Components · Form inputs</div>
  <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:14px;">
    <label style="display:flex;flex-direction:column;gap:6px;">
      <span style="font-family:'Manrope';font-weight:600;font-size:12px;color:#3F3D38;">Email</span>
      <input value="hello@eatfuti.com" style="background:#FFFFFF;border:1.5px solid #E6E0D3;padding:11px 14px;border-radius:12px;font-family:'Manrope';font-size:14px;color:#141413;outline:none;">
    </label>
    <label style="display:flex;flex-direction:column;gap:6px;">
      <span style="font-family:'Manrope';font-weight:600;font-size:12px;color:#3F3D38;">Quantity</span>
      <input value="2 jars" style="background:#FFFFFF;border:1.5px solid #141413;padding:11px 14px;border-radius:12px;font-family:'Manrope';font-size:14px;color:#141413;outline:none;box-shadow:0 0 0 6px rgba(246,197,7,0.30);">
    </label>
    <label style="display:flex;flex-direction:column;gap:6px;">
      <span style="font-family:'Manrope';font-weight:600;font-size:12px;color:#3F3D38;">Postcode</span>
      <input placeholder="E.g. EC1V 9NU" style="background:#FFFFFF;border:1.5px solid #E6E0D3;padding:11px 14px;border-radius:12px;font-family:'Manrope';font-size:14px;color:#9F9A91;outline:none;">
    </label>
    <label style="display:flex;flex-direction:column;gap:6px;">
      <span style="font-family:'Manrope';font-weight:600;font-size:12px;color:#C2412B;">Card</span>
      <input value="4242 4242 4242 0000" style="background:#FFFFFF;border:1.5px solid #C2412B;padding:11px 14px;border-radius:12px;font-family:'Manrope';font-size:14px;color:#141413;outline:none;">
      <span style="font-family:'Manrope';font-size:11px;color:#C2412B;">That card was declined.</span>
    </label>
  </div>
</div>
</body></html>
