<!doctype html><html><head><meta charset="utf-8"><title>Gold scale</title>
<link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="eyebrow">Colors · Futi Gold scale</div>
  <div style="display: grid; grid-template-columns: repeat(11, 1fr); gap: 6px;">
    <div><div style="background:#FFFBEB;height:60px;border-radius:8px;border:1px solid var(--line);"></div><div style="font-family:var(--font-mono);font-size:9px;text-align:center;margin-top:6px;color:var(--ink-600);">50</div></div>
    <div><div style="background:#FEF6D8;height:60px;border-radius:8px;"></div><div style="font-family:var(--font-mono);font-size:9px;text-align:center;margin-top:6px;color:var(--ink-600);">100</div></div>
    <div><div style="background:#FDECAB;height:60px;border-radius:8px;"></div><div style="font-family:var(--font-mono);font-size:9px;text-align:center;margin-top:6px;color:var(--ink-600);">200</div></div>
    <div><div style="background:#FCE077;height:60px;border-radius:8px;"></div><div style="font-family:var(--font-mono);font-size:9px;text-align:center;margin-top:6px;color:var(--ink-600);">300</div></div>
    <div><div style="background:#FAD23A;height:60px;border-radius:8px;"></div><div style="font-family:var(--font-mono);font-size:9px;text-align:center;margin-top:6px;color:var(--ink-600);">400</div></div>
    <div style="position:relative;"><div style="background:#F6C507;height:60px;border-radius:8px;outline:2px solid var(--ink-900);outline-offset:2px;"></div><div style="font-family:var(--font-mono);font-size:9px;text-align:center;margin-top:8px;color:var(--ink-900);font-weight:700;">500★</div></div>
    <div><div style="background:#D9AB04;height:60px;border-radius:8px;"></div><div style="font-family:var(--font-mono);font-size:9px;text-align:center;margin-top:6px;color:var(--ink-600);">600</div></div>
    <div><div style="background:#B89102;height:60px;border-radius:8px;"></div><div style="font-family:var(--font-mono);font-size:9px;text-align:center;margin-top:6px;color:var(--ink-600);">700</div></div>
    <div><div style="background:#8E6E02;height:60px;border-radius:8px;"></div><div style="font-family:var(--font-mono);font-size:9px;text-align:center;margin-top:6px;color:var(--ink-600);">800</div></div>
    <div><div style="background:#5C4801;height:60px;border-radius:8px;"></div><div style="font-family:var(--font-mono);font-size:9px;text-align:center;margin-top:6px;color:var(--ink-600);">900</div></div>
    <div><div style="background:#3A2D00;height:60px;border-radius:8px;"></div><div style="font-family:var(--font-mono);font-size:9px;text-align:center;margin-top:6px;color:var(--ink-600);">950</div></div>
  </div>
  <div style="font-size:13px;color:var(--ink-600);">★ <b style="color:var(--ink-900);">500</b> is the canonical Futi Gold (Pantone 116 C). Lighter tints carry highlights and surfaces; deeper tints work for hover, ink-on-gold, and dark-mode accents.</div>
</div>
</body></html>
