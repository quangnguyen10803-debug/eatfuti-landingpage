<!doctype html><html><head><meta charset="utf-8"><title>Neutral scale</title>
<link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="eyebrow">Colors · Neutral / ink scale</div>
  <div style="display: grid; grid-template-columns: repeat(11, 1fr); gap: 6px;">
    <div><div style="background:#FFFFFF;border:1px solid var(--line);height:60px;border-radius:8px;"></div><div style="font-family:var(--font-mono);font-size:9px;text-align:center;margin-top:6px;color:var(--ink-600);">0</div></div>
    <div><div style="background:#FCF7ED;border:1px solid var(--line);height:60px;border-radius:8px;"></div><div style="font-family:var(--font-mono);font-size:9px;text-align:center;margin-top:6px;color:var(--ink-600);">50</div></div>
    <div><div style="background:#F8F3E6;height:60px;border-radius:8px;"></div><div style="font-family:var(--font-mono);font-size:9px;text-align:center;margin-top:6px;color:var(--ink-600);">100</div></div>
    <div><div style="background:#F1ECDF;height:60px;border-radius:8px;"></div><div style="font-family:var(--font-mono);font-size:9px;text-align:center;margin-top:6px;color:var(--ink-600);">150</div></div>
    <div><div style="background:#E6E0D3;height:60px;border-radius:8px;"></div><div style="font-family:var(--font-mono);font-size:9px;text-align:center;margin-top:6px;color:var(--ink-600);">200</div></div>
    <div><div style="background:#C5BFB4;height:60px;border-radius:8px;"></div><div style="font-family:var(--font-mono);font-size:9px;text-align:center;margin-top:6px;color:var(--ink-600);">300</div></div>
    <div><div style="background:#9F9A91;height:60px;border-radius:8px;"></div><div style="font-family:var(--font-mono);font-size:9px;text-align:center;margin-top:6px;color:var(--ink-600);">400</div></div>
    <div><div style="background:#7A766E;height:60px;border-radius:8px;"></div><div style="font-family:var(--font-mono);font-size:9px;text-align:center;margin-top:6px;color:var(--ink-600);">500</div></div>
    <div><div style="background:#5A5650;height:60px;border-radius:8px;"></div><div style="font-family:var(--font-mono);font-size:9px;text-align:center;margin-top:6px;color:var(--ink-600);">600</div></div>
    <div><div style="background:#3F3D38;height:60px;border-radius:8px;"></div><div style="font-family:var(--font-mono);font-size:9px;text-align:center;margin-top:6px;color:var(--ink-600);">700</div></div>
    <div><div style="background:#141413;height:60px;border-radius:8px;"></div><div style="font-family:var(--font-mono);font-size:9px;text-align:center;margin-top:6px;color:var(--ink-600);">900</div></div>
  </div>
  <div style="font-size:13px;color:var(--ink-600);">Warm neutrals walk from <code style="font-family:var(--font-mono);">#FCF7ED</code> (cream) to <code style="font-family:var(--font-mono);">#141413</code> (espresso). They keep a slight warmth at every step — never dip into a cold gray.</div>
</div>
</body></html>
