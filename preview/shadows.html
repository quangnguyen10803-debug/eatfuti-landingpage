<!doctype html><html><head><meta charset="utf-8"><title>Shadows</title>
<link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="eyebrow">Spacing · Elevation</div>
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:18px;padding:14px 4px;">
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px;"><div style="background:#FFFFFF;width:90px;height:60px;border-radius:12px;box-shadow:0 1px 2px rgba(20,20,19,0.06);"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--ink-600);">xs</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px;"><div style="background:#FFFFFF;width:90px;height:60px;border-radius:12px;box-shadow:0 2px 6px rgba(20,20,19,0.08), 0 1px 2px rgba(20,20,19,0.04);"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--ink-600);">sm</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px;"><div style="background:#FFFFFF;width:90px;height:60px;border-radius:12px;box-shadow:0 8px 20px rgba(20,20,19,0.10), 0 2px 6px rgba(20,20,19,0.06);"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--ink-600);">md</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px;"><div style="background:#FFFFFF;width:90px;height:60px;border-radius:12px;box-shadow:0 24px 48px -12px rgba(20,20,19,0.18), 0 4px 12px rgba(20,20,19,0.08);"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--ink-600);">lg</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px;"><div style="background:#F6C507;width:90px;height:60px;border-radius:12px;box-shadow:0 0 0 6px rgba(246,197,7,0.30);"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--ink-600);">glow (focus)</div></div>
  </div>
</div>
</body></html>
