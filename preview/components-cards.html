<!doctype html><html><head><meta charset="utf-8"><title>Cards</title>
<link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="eyebrow">Components · Cards</div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;">
    <div style="background:#FFFFFF;border-radius:18px;padding:18px;box-shadow:0 2px 6px rgba(20,20,19,0.08);display:flex;flex-direction:column;gap:10px;">
      <div style="aspect-ratio:1.4;background:#F6C507;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#141413;font-family:var(--font-display);font-weight:700;font-size:28px;">F</div>
      <div style="font-family:var(--font-display);font-weight:700;font-size:18px;line-height:1.15;">Honey & Sea Salt Spread</div>
      <div style="font-family:'Manrope';font-size:13px;color:#5A5650;">Single-origin acacia, finished with Maldon. 220g jar.</div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:4px;">
        <span style="font-family:'Manrope';font-weight:700;font-size:16px;">£12</span>
        <button style="background:#141413;color:#FCF7ED;border:none;padding:8px 14px;border-radius:999px;font-family:'Manrope';font-weight:700;font-size:12px;cursor:pointer;">Add</button>
      </div>
    </div>
    <div style="background:#141413;color:#FCF7ED;border-radius:18px;padding:18px;display:flex;flex-direction:column;gap:10px;">
      <span style="background:#F6C507;color:#141413;padding:3px 10px;border-radius:999px;font-family:'Manrope';font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:0.1em;align-self:flex-start;">Limited</span>
      <div style="font-family:var(--font-display);font-weight:700;font-size:20px;line-height:1.1;">The Winter Box, ten things we're eating right now.</div>
      <div style="font-family:'Manrope';font-size:12px;color:#9F9A91;line-height:1.5;">Curated by the Fuoti family — ships Mondays.</div>
    </div>
    <div style="background:#FCF7ED;border:1.5px dashed #C5BFB4;border-radius:18px;padding:18px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:8px;text-align:center;">
      <div style="font-family:var(--font-display);font-weight:700;font-size:16px;">Become a member</div>
      <div style="font-family:'Manrope';font-size:12px;color:#5A5650;">Free shipping & first dibs on drops.</div>
      <button style="background:transparent;color:#141413;border:1.5px solid #141413;padding:7px 14px;border-radius:999px;font-family:'Manrope';font-weight:700;font-size:12px;margin-top:4px;cursor:pointer;">Join free</button>
    </div>
  </div>
</div>
</body></html>
