<!doctype html><html><head><meta charset="utf-8"><title>Logo clearspace</title>
<link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="eyebrow">Brand · Clearspace & minimum size</div>
  <div style="display:grid;grid-template-columns:1.4fr 1fr;gap:18px;align-items:center;">
    <div style="background:#FCF7ED;border:1px solid var(--line);border-radius:14px;padding:0;position:relative;aspect-ratio:1.8;display:flex;align-items:center;justify-content:center;">
      <div style="position:relative;width:120px;height:120px;">
        <div style="position:absolute;inset:-30px;border:1.5px dashed #C5BFB4;border-radius:18px;"></div>
        <img src="../assets/logo-symbol-black.png" style="width:120px;height:120px;">
        <div style="position:absolute;left:-30px;top:50%;transform:translate(-110%,-50%);font-family:var(--font-mono);font-size:10px;color:#7A766E;">¼ × </div>
        <div style="position:absolute;top:-30px;left:50%;transform:translate(-50%,-110%);font-family:var(--font-mono);font-size:10px;color:#7A766E;">¼ ×</div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:14px;">
      <div style="display:flex;align-items:flex-end;gap:14px;">
        <img src="../assets/logo-symbol-black.png" style="width:24px;height:24px;">
        <img src="../assets/logo-symbol-black.png" style="width:40px;height:40px;">
        <img src="../assets/logo-symbol-black.png" style="width:64px;height:64px;">
      </div>
      <div style="font-size:12px;color:var(--ink-600);line-height:1.5;">
        Clearspace = ¼ of the symbol's height on every side. Minimum size: 24px digital, 12mm print. Below that, replace with a wordmark or omit.
      </div>
    </div>
  </div>
</div>
</body></html>
