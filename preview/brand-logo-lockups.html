<!doctype html><html><head><meta charset="utf-8"><title>Logo lockups</title>
<link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="eyebrow">Brand · Logo lockups</div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;">
    <div style="background:#FCF7ED;border:1px solid var(--line);border-radius:14px;padding:24px;display:flex;align-items:center;justify-content:center;aspect-ratio:1.6;">
      <img src="../assets/logo-symbol-black.png" style="width:78px;height:78px;">
    </div>
    <div style="background:#141413;border-radius:14px;padding:24px;display:flex;align-items:center;justify-content:center;aspect-ratio:1.6;">
      <img src="../assets/logo-symbol-yellow.png" style="width:78px;height:78px;">
    </div>
    <div style="background:#F6C507;border-radius:14px;padding:24px;display:flex;align-items:center;justify-content:center;aspect-ratio:1.6;">
      <img src="../assets/logo-symbol-black.png" style="width:78px;height:78px;">
    </div>
  </div>
  <div style="font-size:12px;color:var(--ink-600);">Symbol on Cream (default), Yellow on Espresso (inverse hero), Black on Gold (loud). Always preserve the squircle silhouette — don't crop, recolor, or place on busy imagery without a solid plate.</div>
</div>
</body></html>
