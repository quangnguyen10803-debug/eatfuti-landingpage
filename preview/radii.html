<!doctype html><html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="eyebrow">Spacing · Radii</div>
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:10px;">
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;"><div style="background:#141413;width:60px;height:60px;border-radius:4px;"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--ink-600);">xs · 4</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;"><div style="background:#141413;width:60px;height:60px;border-radius:8px;"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--ink-600);">sm · 8</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;"><div style="background:#141413;width:60px;height:60px;border-radius:12px;"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--ink-600);">md · 12</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;"><div style="background:#141413;width:60px;height:60px;border-radius:18px;"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--ink-600);">lg · 18</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;"><div style="background:#141413;width:60px;height:60px;border-radius:28px;"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--ink-600);">xl · 28</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;"><div style="background:#F6C507;width:60px;height:60px;border-radius:22%;"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--ink-600);">brand · 22%</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;"><div style="background:#141413;width:90px;height:36px;border-radius:999px;"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--ink-600);">pill</div></div>
  </div>
  <div style="font-size:12px;color:var(--ink-600);">The <b>brand</b> radius (22%) is the squircle baked into the logomark. Reach for it on tile/avatar containers to echo the symbol; use numeric radii everywhere else.</div>
</div>
</body></html>
