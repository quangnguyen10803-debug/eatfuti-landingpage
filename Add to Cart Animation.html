document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

); this.fillRef = R(); this.trackRef = R();\n    this.playIconRef = R(); this.pauseIconRef = R();\n    this.card = [R(),R(),R()];\n    this.circle = [R(),R(),R()];\n    this.plus = [R(),R(),R()];\n    this.check = [R(),R(),R()];\n\n    this.t = 0; this.last = 0; this.playing = true;\n    this.travel = [200,150,100];\n    this.topAt = [0,0,0];\n    this.cardHeight = [96,96,96];\n    this.cartTop = 400;\n\n    // timeline (ms)\n    this.HOLD_START = 750;\n    this.STEP = 1350;\n    this.order = [2,1,0];            // remove bottom card first, then up\n    this.SLIDE_DELAY = 170;\n    this.SLIDE_DUR = 640;\n    this.CART_POP = 520;\n    this.CIRCLE_POP = 300;\n    this.COUNT_DELAY = 140;\n    this.removalStart = [0,1,2].map(k => this.HOLD_START + k*this.STEP);\n    this.LOOP_END = this.removalStart[2] + this.SLIDE_DELAY + this.SLIDE_DUR + 1200;\n\n    this.loop = this.loop.bind(this);\n    this.fit = this.fit.bind(this);\n    this.togglePlay = this.togglePlay.bind(this);\n    this.seek = this.seek.bind(this);\n  }\n\n  componentDidMount(){\n    requestAnimationFrame(() => { this.measure(); this.fit(); });\n    window.addEventListener('resize', this.fit);\n    this.raf = requestAnimationFrame(this.loop);\n  }\n  componentWillUnmount(){\n    cancelAnimationFrame(this.raf);\n    window.removeEventListener('resize', this.fit);\n  }\n\n  measure(){\n    const cart = this.cartRef.current; if(!cart) return;\n    this.cartTop = cart.offsetTop;\n    for(let i=0;i<3;i++){\n      const c = this.card[i].current; if(!c) continue;\n      this.topAt[i] = c.offsetTop;\n      this.cardHeight[i] = c.offsetHeight;\n    }\n    const finalCollapse = [0,0,0];\n    for(let k=0;k<3;k++){\n      const j = this.order[k];\n      for(let i=0;i<j;i++) finalCollapse[i] += (this.cardHeight[j] + 14);\n    }\n    for(let i=0;i<3;i++){\n      this.travel[i] = (this.cartTop - this.topAt[i]) + 72 - finalCollapse[i];\n    }\n  }\n  fit(){\n    const st = this.stageRef.current; if(!st) return;\n    const w = st.offsetWidth, h = st.offsetHeight;\n    if(!w || !h) return;\n    const s = Math.min(1, (window.innerWidth - 40)/w, (window.innerHeight - 150)/h);\n    st.style.transform = 'scale(' + s + ')';\n  }\n\n  loop(ts){\n    if(!this.last) this.last = ts;\n    const dt = Math.min(64, ts - this.last); this.last = ts;\n    if(this.playing){ this.t += dt; if(this.t >= this.LOOP_END) this.t = 0; }\n    this.apply(this.t);\n    this.raf = requestAnimationFrame(this.loop);\n  }\n\n  apply(t){\n    const clamp = (x,a,b)=>Math.max(a,Math.min(b,x));\n    const easeIn = x => x*x*x;\n    const easeOut = x => 1 - Math.pow(1-x, 2);\n\n    // Collapse: when a removed card is ~82% through its slide, cards above it drop down\n    const COLLAPSE_SP = 0.82, COLLAPSE_DUR = 400;\n    const collapseStart = k => this.removalStart[k] + this.SLIDE_DELAY + COLLAPSE_SP*this.SLIDE_DUR;\n\n    const collapseOff = [0,0,0];\n    for(let k=0;k<3;k++){\n      const j = this.order[k];\n      const cp = clamp((t - collapseStart(k))/COLLAPSE_DUR, 0, 1);\n      const amount = (this.cardHeight[j] + 14) * easeOut(cp);\n      for(let i=0;i<j;i++) collapseOff[i] += amount;\n    }\n\n    let count = 0;\n    for(let k=0;k<3;k++){ if(t >= this.removalStart[k] + this.COUNT_DELAY) count++; }\n\n    for(let i=0;i<3;i++){\n      const k = this.order.indexOf(i);\n      const rs = this.removalStart[k];\n      const card = this.card[i].current, circle = this.circle[i].current,\n            plus = this.plus[i].current, check = this.check[i].current;\n      if(!card) continue;\n\n      if(t < rs){\n        card.style.transform = 'translateY(' + collapseOff[i] + 'px) scale(1)';\n        card.style.opacity = '1';\n        card.style.pointerEvents = 'auto';\n        if(circle){ circle.style.backgroundColor = '#ffffff'; circle.style.transform = 'scale(1)'; }\n        if(plus) plus.style.opacity = '1';\n        if(check) check.style.opacity = '0';\n      } else {\n        const cp = clamp((t - rs)/this.CIRCLE_POP, 0, 1);\n        const cs = 1 + 0.2*Math.sin(Math.PI*cp);\n        if(circle){ circle.style.backgroundColor = '#1FAD66'; circle.style.transform = 'scale(' + cs + ')'; }\n        if(plus) plus.style.opacity = '0';\n        if(check) check.style.opacity = '1';\n\n        const sp = clamp((t - (rs + this.SLIDE_DELAY))/this.SLIDE_DUR, 0, 1);\n        const e = easeIn(sp);\n        const ty = collapseOff[i] + e * this.travel[i] * 0.52;\n        const op = clamp(sp < 0.28 ? 1 : 1 - (sp - 0.28)/0.72, 0, 1);\n        const scl = 1 - 0.14*e;\n        card.style.transform = 'translateY(' + ty + 'px) scale(' + scl + ')';\n        card.style.opacity = '' + op;\n        card.style.pointerEvents = 'none';\n      }\n    }\n\n    let cartScale = 1;\n    for(let k=0;k<3;k++){\n      const ps = this.removalStart[k] + this.COUNT_DELAY;\n      if(t >= ps && t <= ps + this.CART_POP){\n        const pp = (t - ps)/this.CART_POP;\n        cartScale = 1 + 0.05*Math.sin(Math.PI*pp);\n      }\n    }\n    if(this.cartRef.current) this.cartRef.current.style.transform = 'scale(' + cartScale + ')';\n\n    if(this.labelRef.current)\n      this.labelRef.current.textContent = count === 0 ? 'Add to card' : (count + ' item' + (count>1?'s':'') + ' added');\n    if(this.counterRef.current) this.counterRef.current.textContent = '' + count;\n    if(this.fillRef.current) this.fillRef.current.style.width = (clamp(t/this.LOOP_END,0,1)*100) + '%';\n  }\n\n  updatePlayIcon(){\n    if(this.playIconRef.current) this.playIconRef.current.style.display = this.playing ? 'none' : 'block';\n    if(this.pauseIconRef.current) this.pauseIconRef.current.style.display = this.playing ? 'block' : 'none';\n  }\n  togglePlay(){\n    this.playing = !this.playing;\n    this.setState({ playing: this.playing });\n    this.updatePlayIcon();\n  }\n  seek(e){\n    const tr = this.trackRef.current; if(!tr) return;\n    const r = tr.getBoundingClientRect();\n    let f = (e.clientX - r.left)/r.width;\n    f = Math.max(0, Math.min(1, f));\n    this.t = f * this.LOOP_END;\n    this.playing = false;\n    this.setState({ playing: false });\n    this.updatePlayIcon();\n    this.apply(this.t);\n  }\n\n  renderVals(){\n    return {\n      stageRef:this.stageRef, contentRef:this.contentRef, cartRef:this.cartRef,\n      labelRef:this.labelRef, counterRef:this.counterRef, fillRef:this.fillRef, trackRef:this.trackRef,\n      playIconRef:this.playIconRef, pauseIconRef:this.pauseIconRef,\n      card0:this.card[0], card1:this.card[1], card2:this.card[2],\n      circle0:this.circle[0], circle1:this.circle[1], circle2:this.circle[2],\n      plus0:this.plus[0], plus1:this.plus[1], plus2:this.plus[2],\n      check0:this.check[0], check1:this.check[1], check2:this.check[2],\n      togglePlay:this.togglePlay, seek:this.seek\n    };\n  }\n}\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
